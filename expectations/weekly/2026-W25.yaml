expectations:
  - id: time-war-baseline-2026-W25
    horizon: weekly
    period: 2026-W25
    project: time-war
    severity: important
    weight: 1
    promise: >
      Establish a baseline publishing cadence for Time War by publishing or scheduling
      one longform introduction and three Shorts per day for the first measured week.
    tests:
      - id: monday-longform-receipt-exists
        type: receipt_exists
        severity: critical
        weight: 5
        query:
          project: time-war
          type: youtube_longform_upload
          period: 2026-W25
        required_count: 1

      - id: daily-shorts-cadence
        type: receipt_count_by_day
        severity: critical
        weight: 7
        query:
          project: time-war
          type: youtube_short_upload
          period: 2026-W25
        required_per_day: 3
        days:
          - "2026-06-15"
          - "2026-06-16"
          - "2026-06-17"
          - "2026-06-18"
          - "2026-06-19"
          - "2026-06-20"
          - "2026-06-21"

      - id: all-youtube-receipts-link-hhgttf
        type: field_contains
        severity: important
        weight: 3
        query:
          project: time-war
          type:
            - youtube_longform_upload
            - youtube_short_upload
          period: 2026-W25
        field: description_links
        contains: https://hitchhikersguidetothefuture.com

      - id: weekly-analytics-baseline-exists
        type: receipt_exists
        severity: important
        weight: 3
        query:
          project: time-war
          type: youtube_analytics_snapshot
          period: 2026-W25
        required_count: 1

  - id: semax-phase-1-scientific-artifact-2026-W25
    horizon: weekly
    period: 2026-W25
    project: semantic-axis
    phase: "1"
    phase_name: Scientific Artifact Loop
    severity: critical
    weight: 13
    promise: >
      By the end of 2026-W25, Semantic Axis turns a measurement into a durable,
      inspectable scientific artifact: saved report block, permalink, fresh-browser
      reconstruction, fork lineage, full provenance, and Ben approval. The captured
      artifact must show the complete user experience, not just a backend response.
    tests:
      - id: saved-report-permalink-ux-artifact-captured
        type: receipt_exists
        severity: critical
        weight: 5
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-1-scientific-artifact
          artifact: saved_report_permalink_walkthrough
          period: 2026-W25
        required_count: 1

      - id: fork-lineage-ux-artifact-captured
        type: receipt_exists
        severity: critical
        weight: 5
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-1-scientific-artifact
          artifact: fork_lineage_walkthrough
          period: 2026-W25
        required_count: 1

      - id: ux-artifact-names-required-experience
        type: field_contains
        severity: important
        weight: 3
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-1-scientific-artifact
          period: 2026-W25
        field: user_experience
        contains: run measurement, save report, open permalink in a fresh browser, fork report

      - id: provenance-visible-in-artifact
        type: field_contains
        severity: critical
        weight: 5
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-1-scientific-artifact
          period: 2026-W25
        field: evidence
        contains: provenance

      - id: ben-phase-1-signoff-recorded
        type: receipt_exists
        severity: critical
        weight: 8
        query:
          project: semantic-axis
          type: ben_phase_signoff
          phase: phase-1-scientific-artifact
          period: 2026-W25
          decision: approved
        required_count: 1
