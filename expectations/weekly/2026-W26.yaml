expectations:
  - id: semax-phase-2-analyst-instrument-2026-W26
    horizon: weekly
    period: 2026-W26
    project: semantic-axis
    phase: "2"
    phase_name: Analyst Instrument
    severity: critical
    weight: 13
    promise: >
      By the end of 2026-W26, Semantic Axis supports the analyst loop from the spec:
      cluster chips for x/a/b, fast perturbation of cluster terms, sensitivity re-runs,
      sample-size honesty, and exportable evidence. The captured artifact must show a user
      varying terms and seeing whether a finding survives the perturbation.
    tests:
      - id: chip-editor-ux-artifact-captured
        type: receipt_exists
        severity: critical
        weight: 5
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-2-analyst-instrument
          artifact: cluster_chip_editor_walkthrough
          period: 2026-W26
        required_count: 1

      - id: sensitivity-run-artifact-captured
        type: receipt_exists
        severity: critical
        weight: 5
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-2-analyst-instrument
          artifact: sensitivity_check_walkthrough
          period: 2026-W26
        required_count: 1

      - id: ux-artifact-names-required-experience
        type: field_contains
        severity: important
        weight: 3
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-2-analyst-instrument
          period: 2026-W26
        field: user_experience
        contains: perturb cluster terms and compare sensitivity output

      - id: export-artifacts-exist
        type: field_contains
        severity: important
        weight: 3
        query:
          project: semantic-axis
          type: semax_ux_artifact_capture
          phase: phase-2-analyst-instrument
          period: 2026-W26
        field: evidence
        contains: export

      - id: ben-phase-2-signoff-recorded
        type: receipt_exists
        severity: critical
        weight: 8
        query:
          project: semantic-axis
          type: ben_phase_signoff
          phase: phase-2-analyst-instrument
          period: 2026-W26
          decision: approved
        required_count: 1
